    // ===== 마커 생성 함수 =====
    function createIcon(place) {
        const lang = TravelLang.getLang();
        const displayName = TravelLang.getName(place, lang);
        const cfg = TYPE_CONFIG[place.type];
        return L.divIcon({
            html: `<div class="circle-marker" style="background:${cfg.color};">
                       <i class="fas ${cfg.icon}"></i>
                   </div>
                   <div class="marker-label" style="color:${cfg.color};">${displayName}</div>`,
            className: 'custom-marker-icon',
            iconSize: [25, 25],
            iconAnchor: [12, 12],
            popupAnchor: [0, -12]
        });
    }

    function getPlaceDesc(place, lang) {
        if (lang === 'ko' && place.descKo) return place.descKo;
        if (lang === 'en' && place.descEn) return place.descEn;
        if (lang === 'ja' && place.descJa) return place.descJa;
        if (lang === 'es' && place.descEs) return place.descEs;
        return place.desc || '';
    }

    function getFeaturesList(place, lang) {
        if (lang === 'ko') return place.featuresKo || [];
        if (lang === 'zh') return place.features || place.featuresKo || [];
        if (lang === 'ja') return place.featuresJa || place.features || place.featuresKo || [];
        if (lang === 'en') return place.featuresEn || place.featuresKo || [];
        if (lang === 'es') return place.featuresEs || place.featuresEn || place.featuresKo || [];
        return place.featuresKo || place.features || [];
    }

    function getAddrLine(place, lang) {
        const ko = place.addrKo || '';
        const zh = place.addr || '';
        const en = place.addrEn || '';
        if (lang === 'ko') return ko;
        if (lang === 'zh' || lang === 'ja') return zh ? `${zh}<br><small style="color:#888;">${ko}</small>` : ko;
        return en ? `${en}<br><small style="color:#888;">${ko}</small>` : ko;
    }

    function createPopup(place) {
        const lang = TravelLang.getLang();
        const ui = TravelLang.getUI(lang);
        const cfg = TYPE_CONFIG[place.type];
        const displayName = TravelLang.getName(place, lang);
        const koName = TravelLang.getName(place, 'ko');
        const subtitle = lang !== 'ko' ? koName : (place.nameEn || '');
        const desc = getPlaceDesc(place, lang);
        const typeLabel = TravelLang.getTypeLabel(place.type, lang);
        const googleUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(koName)}&query=${place.lat},${place.lng}`;
        const naverUrl  = `https://map.naver.com/v5/search/${encodeURIComponent(koName)}`;
        const featsArr  = getFeaturesList(place, lang);
        const features  = featsArr.join('、');
        const addrLine  = getAddrLine(place, lang);

        return `<div class="custom-popup" style="border-color:${cfg.color};">
            <button class="popup-close-btn" style="color:${cfg.color};" onclick="this.closest('.leaflet-popup').querySelector('.leaflet-popup-close-button').click()"><i class="fas fa-times"></i></button>
            <div class="popup-header" style="border-bottom-color:${cfg.color};">
                <h3 class="popup-title" style="color:${cfg.color};">${displayName}</h3>
                ${subtitle && subtitle !== displayName ? `<p class="popup-subtitle" style="color:${cfg.color};">${subtitle}</p>` : ''}
                <span class="type-badge" style="background:${cfg.color};">${typeLabel}</span>
            </div>
            <div class="popup-body">
                <div class="popup-row">
                    <i class="fas fa-map-marker-alt popup-icon" style="color:${cfg.color};"></i>
                    <span>${addrLine}</span>
                </div>
                <div class="popup-row">
                    <i class="fas fa-info-circle popup-icon" style="color:${cfg.color};"></i>
                    <span>${desc}</span>
                </div>
                ${features ? `<div class="popup-row">
                    <i class="fas fa-star popup-icon" style="color:${cfg.color};"></i>
                    <span>${features}</span>
                </div>` : ''}
            </div>
            <div class="popup-footer">
                <a href="${googleUrl}" target="_blank" class="map-btn" style="border-color:${cfg.color};color:${cfg.color};">
                    <i class="fab fa-google" style="color:${cfg.color};"></i> ${ui.googleMap}
                </a>
                <a href="${naverUrl}" target="_blank" class="map-btn" style="border-color:${cfg.color};color:${cfg.color};">
                    <i class="fas fa-map" style="color:${cfg.color};"></i> ${ui.naverMap}
                </a>
            </div>
        </div>`;
    }

    // ===== 마커 추가 (부산 방식: 지도에 직접 추가) =====
    const allMarkers = [];
    PLACES.forEach(p => {
        const marker = L.marker([p.lat, p.lng], { icon: createIcon(p) })
            .addTo(map)
            .bindPopup(createPopup(p), { maxWidth: 300, minWidth: 240 });
        allMarkers.push({ marker, place: p });
    });

    // ===== 줌 레벨에 따라 마커 크기 조절 (부산과 동일) =====
    function updateMarkerSize() {
        const currentZoom = map.getZoom();

        if (currentZoom >= 16) {
            allMarkers.forEach(({ marker }) => {
                const el = marker.getElement();
                if (el) { const cm = el.querySelector('.circle-marker'); if (cm) cm.classList.remove('small-dot'); }
            });
            return;
        }

        allMarkers.forEach(({ marker }) => {
            const el = marker.getElement();
            if (el) { const cm = el.querySelector('.circle-marker'); if (cm) cm.classList.remove('small-dot'); }
        });

        const checkRadius = Math.max(15, 80 - (currentZoom * 4));

        allMarkers.forEach(({ marker, place }, index) => {
            const el = marker.getElement();
            if (!el) return;
            const cm = el.querySelector('.circle-marker');
            if (!cm) return;
            const pos = map.latLngToContainerPoint([place.lat, place.lng]);
            let hasNearby = false;
            for (let i = 0; i < allMarkers.length; i++) {
                if (i === index) continue;
                const other = allMarkers[i].place;
                const otherPos = map.latLngToContainerPoint([other.lat, other.lng]);
                const dist = Math.sqrt(Math.pow(pos.x - otherPos.x, 2) + Math.pow(pos.y - otherPos.y, 2));
                if (dist < checkRadius) { hasNearby = true; break; }
            }
            if (hasNearby) cm.classList.add('small-dot');
        });
    }
    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    // ===== UI 언어 초기화 =====
    (function() {
        const lang = TravelLang.getLang();
        const ui = TravelLang.getUI(lang);
        const types = ui.types;
        // 범례 텍스트
        const legA = document.getElementById('leg-attraction');
        const legF = document.getElementById('leg-food');
        const legH = document.getElementById('leg-hotel');
        if (legA) legA.textContent = types.attraction || types.attractions || '景点';
        if (legF) legF.textContent = types.restaurants || '美食';
        if (legH) legH.textContent = types.hotels || '住宿';
        // 타일 패널 라벨
        const tileSpan = document.getElementById('tile-label-span');
        if (tileSpan && ui.tileLabel) tileSpan.textContent = ui.tileLabel;
        // 타일 옵션 텍스트
        if (ui.tileOptions) {
            document.querySelectorAll('#tile-select option').forEach(o => {
                const key = o.getAttribute('data-tile') || o.value;
                if (ui.tileOptions[key]) o.textContent = ui.tileOptions[key];
            });
        }
        // 메인으로 버튼
        const backLink = document.querySelector('a[href="index.html"]');
        if (backLink) {
            const icon = backLink.querySelector('i');
            backLink.textContent = ' ' + ui.backMain;
            if (icon) backLink.prepend(icon);
        }
    })();
    </script>
</body>
</html>
