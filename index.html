<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 여행 지도</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a4a 0%, #2c4a7c 50%, #1a3a5c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        .title {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        .dest-btn {
            width: 110px;
            height: 140px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .dest-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .dest-btn.busan {
            background: linear-gradient(160deg, #4A7FB5 0%, #2c5f8f 100%);
            box-shadow: 0 6px 18px rgba(74,127,181,0.4);
        }

        .dest-btn.jeju {
            background: linear-gradient(160deg, #4A9B6F 0%, #2c7a50 100%);
            box-shadow: 0 6px 18px rgba(74,155,111,0.4);
        }

        .dest-btn.seoul {
            background: linear-gradient(160deg, #8B5A6B 0%, #6b3a4e 100%);
            box-shadow: 0 6px 18px rgba(139,90,107,0.4);
        }

        .dest-btn .emoji {
            font-size: 2rem;
        }

        .dest-btn .label {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dest-btn .desc {
            color: rgba(255,255,255,0.75);
            font-size: 0.7rem;
        }

        .lang-selector {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }

        .lang-btn {
            background: rgba(255,255,255,0.12);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 5px 9px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
        }

        .lang-btn.active {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.75);
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.22);
        }

        @media (max-width: 480px) {
            .title { font-size: 1.3rem; }
            .btn-group { gap: 0.7rem; }
            .dest-btn { width: 90px; height: 120px; }
            .dest-btn .emoji { font-size: 1.6rem; }
            .dest-btn .label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="title">우리 가족 여행 지도</div>
    <div class="subtitle">여행지를 선택하세요</div>

    <div class="lang-selector">
        <button class="lang-btn" data-lang="ko" onclick="selectLang(this)" title="한국어">🇰🇷</button>
        <button class="lang-btn" data-lang="en" onclick="selectLang(this)" title="English">🇺🇸</button>
        <button class="lang-btn" data-lang="zh" onclick="selectLang(this)" title="中文">🇨🇳</button>
        <button class="lang-btn" data-lang="ja" onclick="selectLang(this)" title="日本語">🇯🇵</button>
        <button class="lang-btn" data-lang="es" onclick="selectLang(this)" title="Español">🇪🇸</button>
    </div>

    <div class="btn-group">
        <a href="busan.html" class="dest-btn busan">
            <span class="emoji">🌊</span>
            <span class="label">부산</span>
            <span class="desc">부산 여행 계획</span>
        </a>
        <a href="jeju.html" class="dest-btn jeju">
            <span class="emoji">🍊</span>
            <span class="label">济州</span>
            <span class="desc">제주 여행 계획</span>
        </a>
        <a href="seoul.html" class="dest-btn seoul">
            <span class="emoji">🏙️</span>
            <span class="label">서울</span>
            <span class="desc">서울 여행 계획</span>
        </a>
    </div>
    <script>
        (function() {
            var lang = localStorage.getItem('travellang') || 'ko';
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                if (btn.dataset.lang === lang) btn.classList.add('active');
            });
        })();

        function selectLang(btn) {
            document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            localStorage.setItem('travellang', btn.dataset.lang);
        }
    </script>
</body>
</html>
